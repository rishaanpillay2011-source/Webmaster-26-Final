<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map — Pathfinders</title>
    <meta
      name="description"
      content="Browse approved Pathfinders resources on an interactive map."
    />

    <script src="../js/functionality/theme-init.js"></script>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <div class="page">
      <div id="nav-container"></div>

      <main class="map-shell">
        <aside class="map-sidebar">
          <div class="map-search-wrap">
            <i data-lucide="search" class="map-search-icon"></i>
            <input
              id="map-search"
              class="map-search-input"
              type="text"
              placeholder="Search map resources..."
              aria-label="Search map resources"
            />
          </div>
          <div id="map-resource-list" aria-live="polite"></div>
        </aside>

        <section class="map-map" aria-label="Resource map">
          <div id="map-container"></div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP Core + Plugins (Local) -->
    <script src="../gsap/gsap.min.js"></script>
    <script src="../gsap/ScrollTrigger.min.js"></script>
    
    <script src="../js/animations/smooth-scroll.js"></script>
    <script src="../js/functionality/resources.js"></script>
    <script src="../js/functionality/nav.js"></script>
    <script src="../js/animations/animations.js"></script>
    <script src="../js/functionality/map.js"></script>
  </body>
</html>
